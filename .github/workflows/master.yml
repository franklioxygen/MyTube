name: Build and Test

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    env:
      CODACY_API_TOKEN: ${{ secrets.CODACY_API_TOKEN }}
      CODACY_PROJECT_TOKEN: ${{ secrets.CODACY_PROJECT_TOKEN }}
      SKIP_PROVIDER_BUILD: "1"
      PUPPETEER_SKIP_DOWNLOAD: "true"
    
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node-version: [20.x]

    steps:
    - uses: actions/checkout@v4
    
    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: npm
        cache-dependency-path: |
          package-lock.json
          frontend/package-lock.json
          backend/package-lock.json
        
    - name: Install Dependencies
      run: |
        npm ci
        npm --prefix frontend ci
        npm --prefix backend ci
      
    - name: Lint Frontend
      run: npm --prefix frontend run lint

    - name: Build Frontend
      run: npm --prefix frontend run build
        
    - name: Build Backend
      run: npm --prefix backend run build
        
    - name: Test Backend
      run: npm --prefix backend run test -- run

    - name: Test Frontend
      run: npm --prefix frontend run test -- run

    - name: Generate Coverage Reports
      if: ${{ matrix.os == 'ubuntu-latest' && (env.CODACY_API_TOKEN != '' || env.CODACY_PROJECT_TOKEN != '') }}
      run: |
        npm --prefix backend run test:coverage -- --coverage.reporter=lcov
        npm --prefix frontend run test:coverage -- --coverage.reporter=lcov

    - name: Upload Coverage Reports to Codacy (API Token)
      if: ${{ matrix.os == 'ubuntu-latest' && env.CODACY_API_TOKEN != '' }}
      uses: codacy/codacy-coverage-reporter-action@89d6c85cfafaec52c72b6c5e8b2878d33104c699 # v1.3.0
      with:
        api-token: ${{ secrets.CODACY_API_TOKEN }}
        coverage-reports: backend/coverage/lcov.info,frontend/coverage/lcov.info
        force-coverage-parser: lcov

    - name: Upload Coverage Reports to Codacy (Project Token)
      if: ${{ matrix.os == 'ubuntu-latest' && env.CODACY_API_TOKEN == '' && env.CODACY_PROJECT_TOKEN != '' }}
      uses: codacy/codacy-coverage-reporter-action@89d6c85cfafaec52c72b6c5e8b2878d33104c699 # v1.3.0
      with:
        project-token: ${{ secrets.CODACY_PROJECT_TOKEN }}
        coverage-reports: backend/coverage/lcov.info,frontend/coverage/lcov.info
        force-coverage-parser: lcov
