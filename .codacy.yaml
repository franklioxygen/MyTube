---
exclude_paths:
  - "node_modules/**"
  - "**/node_modules/**"
  - "backend/bgutil-ytdlp-pot-provider/**"
  - "**/bgutil-ytdlp-pot-provider/**"
  - "dist/**"
  - "**/dist/**"
  - "build/**"
  - "**/build/**"
  - "coverage/**"
  - "**/coverage/**"
  - "codeql-db/**"
  - "codeql-reports/**"
  - "**/.vite/**"
  - "uploads/**"
  - ".codacy/**"
  - ".git/**"
  - "frontend/src/utils/locales/**"
  - "frontend/src/**/__tests__/**"
  - "backend/src/__tests__/**"
  - "backend/src/**/__tests__/**"
  # SQLite Drizzle migrations are analyzed with T-SQL-specific rules in Codacy.
  - "backend/drizzle/**"
engines:
  eslint-8:
    exclude_paths:
      - "**/*.cjs"
      - "**/*.js"
      - "**/*.jsx"
      - "**/*.mjs"
      - "**/*.ts"
      - "**/*.tsx"
  opengrep:
    exclude_paths:
      - "backend/src/utils/security.ts"
      - "scripts/codacy/generate-issues-report.mjs"
      - "scripts/lighthouse/generate-badge.mjs"
      - "scripts/loc/generate-badge.mjs"
